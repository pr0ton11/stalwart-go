# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
package: stalwart
output: stalwart/client.gen.go
generate:
  models: true
  client: true
output-options:
  # The Stalwart OpenAPI spec uses heavily inline schemas rather than named $ref components.
  # oapi-codegen's pruning logic can incorrectly remove synthesized types for these inline
  # schemas, causing compilation errors. skip-prune keeps all generated types as a workaround.
  skip-prune: true
