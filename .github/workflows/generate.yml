name: Generate Stalwart Go Client

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Fetch latest OpenAPI spec
        run: |
          curl -sL "https://raw.githubusercontent.com/stalwartlabs/stalwart/main/api/v1/openapi.yml" -o api/openapi.yml

      - name: Patch spec (fix upstream duplicates)
        run: python3 patch_spec.py

      - name: Generate client
        run: go generate ./...

      - name: Tidy modules
        run: go mod tidy

      - name: Verify build
        run: go build ./...

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate client from latest Stalwart OpenAPI spec"
          title: "chore: update generated Stalwart API client"
          body: |
            This PR was automatically generated by the [Generate Stalwart Go Client](../actions/workflows/generate.yml) workflow.

            It updates the generated Go client code based on the latest [Stalwart OpenAPI spec](https://github.com/stalwartlabs/stalwart/blob/main/api/v1/openapi.yml).

            Please review the changes to ensure compatibility.
          branch: chore/update-generated-client
          delete-branch: true
          labels: automated,dependencies
